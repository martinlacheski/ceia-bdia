name: bdia_clase_04

services:
  mongodb:
    image: mongo:8.0.12
    container_name: bdia_mongodb_clase_04
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MONGO_LISTEN_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./00_cargar_datos.js:/scripts/00_cargar_datos.js:ro
      - ./data:/data/practica:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet --host localhost --port 27017
          --username "$${MONGO_INITDB_ROOT_USERNAME}"
          --password "$${MONGO_INITDB_ROOT_PASSWORD}"
          --authenticationDatabase admin
          --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bdia_mongodb_network

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: bdia_mongo_express_clase_04
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_LISTEN_PORT}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bdia_mongodb_network

volumes:
  mongodb_data:

networks:
  bdia_mongodb_network:
    driver: bridge
